services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cartera_backend
    command: sh -c "python3 -c \"from app.core.database import init_db; init_db()\" && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - /opt/riap/db:/opt/riap/db
    ports:
      - "8055:8000"  # Cambiado de 8001 a 8055
    environment:
      DB_PATH: /opt/riap/db/cartera.db
      USE_SQLITE: "True"
      SECRET_KEY: ${SECRET_KEY:-supersecretkeychangeinproduction1234567890}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEBUG: "True"
      ENVIRONMENT: development
    depends_on:
      - redis
    networks:
      - cartera_network

  redis:
    image: redis:alpine
    container_name: cartera_redis
    networks:
      - cartera_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cartera_frontend
    ports:
      - "5055:80"  # Cambiado de 5173 a 5055
    depends_on:
      - backend
    networks:
      - cartera_network
    environment:
      VITE_API_BASE_URL: /api/v1

networks:
  cartera_network:
    driver: bridge