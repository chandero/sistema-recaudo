server {
    server_name giron.cyberrit.tiksgroup.co;

    # Servir el frontend directamente desde el contenedor
    location / {
        proxy_pass http://127.0.0.1:5173;  # Frontend en desarrollo o directo
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Para SPA routing
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }

    # API Backend - CRÍTICO para que funcione
    location /api/ {
        proxy_pass http://127.0.0.1:8001;  # Puerto correcto del backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Headers para CORS
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        
        # Manejar solicitudes CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 200;
        }
    }
    
    # WebSockets - Para tiempo real
    location /ws {
        proxy_pass http://127.0.0.1:8001;  # Puerto correcto del backend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Ruta para servir el frontend en producción
    location @fallback {
        proxy_pass http://127.0.0.1:5173;  # Frontend en desarrollo o directo
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Health check
    location /health {
        return 200 "CyberRIT OK";
        add_header Content-Type text/plain;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/giron.cyberrit.tiksgroup.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/giron.cyberrit.tiksgroup.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = giron.cyberrit.tiksgroup.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name giron.cyberrit.tiksgroup.co;
    return 404; # managed by Certbot
}