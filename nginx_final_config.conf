# Definir upstreams para balanceo de carga y mantenimiento
upstream backend {
    server 127.0.0.1:8001;  # Puerto donde está expuesto el backend en el host
}

upstream frontend {
    server 127.0.0.1:5173;  # Puerto donde está expuesto el frontend en el host
}

server {
    server_name giron.cyberrit.tiksgroup.co;

    # Aumentar el límite de tamaño de cuerpo para uploads
    client_max_body_size 100M;
    
    # API Backend - Ruta crítica para que funcione el sistema
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Headers para CORS
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        
        # Manejar solicitudes CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 200;
        }
        
        # Configuración adicional para manejar APIs
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # WebSockets - Para tiempo real
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Archivos estáticos del backend
    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Frontend - SPA (Single Page Application)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configuración para SPA routing
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }
    
    # Fallback para rutas SPA - permite navegación interna en la aplicación
    location @fallback {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Health check
    location /health {
        return 200 "CyberRIT OK";
        add_header Content-Type text/plain;
        access_log off;
    }

    # SSL Configuration (Let's Encrypt)
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/giron.cyberrit.tiksgroup.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/giron.cyberrit.tiksgroup.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    
    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

# Redirección HTTP a HTTPS
server {
    if ($host = giron.cyberrit.tiksgroup.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name giron.cyberrit.tiksgroup.co;
    return 404; # managed by Certbot
}